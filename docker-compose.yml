version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpon-manager
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      CI_ENVIRONMENT: ${APP_ENV:-production}
      APP_BASE_URL: ${APP_URL:-}
      DB_HOST: mysql
      DB_NAME: gpon_manager
      DB_USER: gpon
      DB_PASS: ${DB_PASS:-gpon_secret}
      SESSION_EXPIRATION: "7200"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - gpon_writable:/var/www/html/writable
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpon-net

  mysql:
    image: mysql:8.0
    container_name: gpon-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_secret}
      MYSQL_DATABASE: gpon_manager
      MYSQL_USER: gpon
      MYSQL_PASSWORD: ${DB_PASS:-gpon_secret}
    volumes:
      - gpon_mysql_data:/var/lib/mysql
      - ./database/migrations/001_create_gpon_tables.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./database/seeds/AdminSeeder.sql:/docker-entrypoint-initdb.d/099_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "gpon", "-p${DB_PASS:-gpon_secret}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - gpon-net

volumes:
  gpon_writable:
    driver: local
  gpon_mysql_data:
    driver: local

networks:
  gpon-net:
    driver: bridge
