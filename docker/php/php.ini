[PHP]
; Upload
upload_max_filesize = 20M
post_max_size       = 20M

; Execution — perpanjang untuk refresh-cache yang bisa lama
max_execution_time  = 120
max_input_time      = 60
memory_limit        = 128M

; Timezone
date.timezone = Asia/Jakarta

; Error — nonaktifkan display di production, log saja
display_errors   = Off
display_startup_errors = Off
log_errors       = On
; error_log diarahkan ke writable agar persisten
error_log        = /var/www/html/writable/logs/php_errors.log

; Sessions
session.save_path = /var/www/html/writable/session
session.gc_maxlifetime = 7200

[opcache]
opcache.enable              = 1
opcache.memory_consumption  = 128
opcache.max_accelerated_files = 4000
; validate_timestamps=1 + revalidate_freq=0: cek perubahan file setiap request
; Di production ganti ke 0/0 untuk performa maksimal (rebuild image saat deploy)
opcache.validate_timestamps = 1
opcache.revalidate_freq     = 0
