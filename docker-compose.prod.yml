version: '3.8'

# ============================================================
# GPON Manager — Production
#
# Cara deploy:
#   1. Salin file ini ke server
#   2. Sesuaikan environment variables di bawah (atau buat .env.prod)
#   3. docker compose -f docker-compose.prod.yml up -d
#
# MySQL bisa pakai container di bawah ATAU MySQL/MariaDB yang
# sudah ada di server (set DB_HOST ke IP/hostname MySQL-mu).
# ============================================================

services:

  app:
    image: gpon-manager:latest     # hasil docker build -t gpon-manager:latest .
    # Atau langsung build di server:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: gpon-manager
    restart: unless-stopped
    ports:
      - "8080:80"  # Akses via http://IP:8080 — ganti ke "127.0.0.1:8080:80" jika pakai reverse proxy
    environment:
      CI_ENVIRONMENT: production
      APP_BASE_URL: "http://localhost:8080/"   # <-- GANTI ke IP/domain server
      DB_HOST: mysql                                   # atau IP eksternal
      DB_NAME: gpon_manager
      DB_USER: gpon
      DB_PASS: ganti_password_kuat                    # <-- GANTI
      SESSION_EXPIRATION: "7200"
      ENCRYPTION_KEY: ""  # biarkan kosong → auto-generate saat pertama boot
    volumes:
      - gpon_writable:/var/www/html/writable   # log, cache, onu_cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gpon-net

  mysql:
    image: mysql:8.0
    container_name: gpon-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_ganti_ini       # <-- GANTI
      MYSQL_DATABASE: gpon_manager
      MYSQL_USER: gpon
      MYSQL_PASSWORD: ganti_password_kuat       # <-- GANTI (sama dengan DB_PASS app)
    volumes:
      - gpon_mysql_data:/var/lib/mysql
      - ./database/migrations/001_create_gpon_tables.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./database/seeds/AdminSeeder.sql:/docker-entrypoint-initdb.d/099_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "gpon", "-pganti_password_kuat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - gpon-net
    # JANGAN expose port MySQL ke publik di production!
    # ports:
    #   - "3306:3306"

volumes:
  gpon_writable:
    driver: local
  gpon_mysql_data:
    driver: local

networks:
  gpon-net:
    driver: bridge
